<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #e5e5e5;
  }

  .Calculator {
    width: 240px;
    background-color: black;
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
  }

  h1 {
    color: white;
    width: 100%;
    text-align: center;
    margin-bottom: 10px;
  }

  #display {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    font-size: 18px;
    border-radius: 5px;
    border: none;
    text-align: right;   /* Numbers right side */
  }

  .btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: none;
    margin-bottom: 10px;
    font-size: 16px;
    cursor: pointer;
  }

  .btn:hover {
    background-color: #ccc;
  }
</style>
</head>

<body>
    <div class="Calculator">
        <h1>Calculator</h1>
        <input type="text" id="display" />
        <div class="buttons">
            <button onclick="clearDisplay()" class="btn">C</button>
            <button onclick="backspace()"class='btn'>⌫</button>
            <div class="button-wrap">
                <button onclick="displayvalue('7')" class="btn">7</button>
                <button onclick="displayvalue('8')" class="btn">8</button>
                <button onclick="displayvalue('9')" class="btn">9</button>
                <button onclick="displayvalue('/')" class="btn">/</button>
            </div>
            <div class="button-wrap">
                <button onclick="displayvalue('4')" class="btn">4</button>
                <button onclick="displayvalue('5')" class="btn">5</button>
                <button onclick="displayvalue('6')" class="btn">6</button>
                <button onclick="displayvalue('*')" class="btn">*</button>
            </div>
            <div class="button-wrap">
                <button onclick="displayvalue('1')" class="btn">1</button>
                <button onclick="displayvalue('2')" class="btn">2</button>
                <button onclick="displayvalue('3')" class="btn">3</button>
                <button onclick="displayvalue('-')" class="btn">-</button>
            </div>
            <div class="button-wrap">
                <button onclick="displayvalue('.')" class="btn">.</button>
                <button onclick="displayvalue('0')" class="btn">0</button>
                <button onclick="displayvalue('+')" class="btn">+</button>
                <button onclick="answer('=')" class="btn">=</button>
            </div>
        </div>
    </div>
    <script>
        function displayvalue(val){
    document.getElementById("display").value=document.getElementById("display").value+val;
}

function clearDisplay(){
    document.getElementById("display").value='';
}

function backspace(){
   let a= document.getElementById("display");
   a.value=a.value.slice(0,-1);
}

function answer(){
    var userInput = document.getElementById("display").value;
    var result=eval(userInput);

    document.getElementById("display").value=result;
}
    </script>
</body>
</html>
